name: Update Version Record

on:
  repository_dispatch:
    types: [version_update]

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update Version File
        run: |
          echo "${{ github.event.client_payload.version }}" > VERSION.txt
          date >> VERSION.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION.txt
          git commit -m "Update to version ${{ github.event.client_payload.version }}"
          git push

      - name: Create Public Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.client_payload.version }}
          name: Release ${{ github.event.client_payload.version }}
          body: |
            Automatically updated from private main repository.
            Description: ${{ github.event.client_payload.desc }}